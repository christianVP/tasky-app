name: Build and Push Mongo Backup

on:
  push:
    branches:
      - main
    paths:
      - mongo-backup/**/*
      - '.github/workflows/docker-build-backup.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Mongo Backup Image
        run: docker build -t cvp01/mongo-backup:latest ./mongo-backup

      - name: Push Mongo Backup Image
        run: docker push cvp01/mongo-backup:latest

